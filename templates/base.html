<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain Anosa | OOP Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --p3-cyan: #00e1ff;
            --p3-dark-navy: #0b111b;
        }
        body { background-color: var(--p3-dark-navy); margin: 0; }
        .p3-blue { color: var(--p3-cyan); }
        .p3-bg-blue { background-color: var(--p3-cyan); }
        .p3-border { border-color: var(--p3-cyan); }
        .p3-card { background-color: black; border: 2px solid white; }
    </style>
</head>
<body class="text-white font-sans selection:bg-cyan-500/50">

    <nav class="border-b border-cyan-900/50 bg-black/60 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-2xl font-black tracking-tighter text-white italic">
                RAIN ANOSA <span class="p3-blue"> OOP </span>PORTFOLIO
            </span>
            <div class="hidden md:flex items-center space-x-4 text-xs font-bold uppercase tracking-widest">
                <a href="{{ url_for('home') }}" class="px-5 py-2 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg]">
                    <span class="inline-block skew-x-[12deg]">Home</span>
                </a>
                <a href="{{ url_for('midterm') }}" class="px-5 py-2 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg]">
                    <span class="inline-block skew-x-[12deg]">Midterm</span>
                </a>
                <a href="{{ url_for('finals') }}" class="px-5 py-2 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg]">
                    <span class="inline-block skew-x-[12deg]">Final</span>
                </a>
                <a href="{{ url_for('contact') }}" class="px-5 py-2 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg]">
                    <span class="inline-block skew-x-[12deg]">Contact</span>
                </a>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="py-12 border-t border-cyan-900/30 text-center">
        <p class="text-xs font-bold tracking-[0.3em] uppercase text-slate-500 italic">
            Developed by Rain &copy; 2026 | <span class="p3-blue">Flask and Tailwind.CSS</span>
        </p>
    </footer>

</body>
</html>
