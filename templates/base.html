<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain Anosa | OOP Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --p3-cyan: #00e1ff;
            --p3-dark-navy: #0b111b;
        }
        body { background-color: var(--p3-dark-navy); margin: 0; }
        .p3-blue { color: var(--p3-cyan); }
        .p3-bg-blue { background-color: var(--p3-cyan); }
        .p3-border { border-color: var(--p3-cyan); }
        .p3-card { background-color: black; border: 2px solid white; }
    </style>
</head>
<body class="text-white font-sans selection:bg-cyan-500/50">

    <nav class="flex flex-col md:flex-row items-center justify-center gap-6 w-full">
    
    <a href="{{ url_for('home') }}" class="w-full md:w-auto px-8 py-3 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg] text-center border-b-4 border-black/20">
        <span class="inline-block skew-x-[12deg] uppercase italic tracking-tighter">Home</span>
    </a>
    <a href="{{ url_for('midterm') }}" class="w-full md:w-auto px-8 py-3 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg] text-center border-b-4 border-black/20">
        <span class="inline-block skew-x-[12deg] uppercase italic tracking-tighter">Midterm</span>
    </a>

    <a href="{{ url_for('finals') }}" class="w-full md:w-auto px-8 py-3 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg] text-center border-b-4 border-black/20">
        <span class="inline-block skew-x-[12deg] uppercase italic tracking-tighter">Finals</span>
    </a>

    <a href="{{ url_for('contact') }}" class="w-full md:w-auto px-8 py-3 p3-bg-blue text-black font-black hover:bg-white transition-all skew-x-[-12deg] text-center border-b-4 border-black/20">
        <span class="inline-block skew-x-[12deg] uppercase italic tracking-tighter">Contact</span>
    </a>

</nav>

    {% block content %}
    {% endblock %}

    <footer class="py-12 border-t border-cyan-900/30 text-center">
        <p class="text-xs font-bold tracking-[0.3em] uppercase text-slate-500 italic">
            Developed by Rain &copy; 2026 | <span class="p3-blue">Flask and Tailwind.CSS</span>
        </p>
    </footer>

</body>
</html>
